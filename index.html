<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ECData - Mapa Electoral Interactivo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* 2. FONTO BLANCO RESTAURADO */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: white; }
        #map { width: 100%; height: 100vh; background-color: white; }
        
        .year-label {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 10px; border: 1px solid #333;
            font-family: Arial, sans-serif; font-weight: bold; font-size: 22px;
        }

        /* Redondeo para el cuadro PEX */
        .pex-rounded { rx: 8; ry: 8; }
    </style>
</head>
<body>
    <div id="year-display" class="year-label">1ra Vuelta 2011</div>
    <div id="map"></div>

    <script>
        var map = L.map('map', {
            zoomControl: false, dragging: false, scrollWheelZoom: false,
            doubleClickZoom: false, touchZoom: false, attributionControl: false
        }).setView([-9.5, -78], 5.2);

        const elecciones = {
            "2011": { "LIMA": "#ff8c00", "CALLAO": "#ce1126", "EXTRANJERO": "#ff8c00", "CUSCO": "#ce1126" },
            "2016": { "LIMA": "#ff8c00", "CALLAO": "#ffcc00", "EXTRANJERO": "#ffcc00", "CUSCO": "#ffcc00" },
            "2021": { "LIMA": "#0047ab", "CALLAO": "#0047ab", "EXTRANJERO": "#0047ab", "CUSCO": "#ce1126" }
        };

        const periodos = ["2011", "2016", "2021"];
        let currentIndex = 0;
        let geoJsonLayer, callaoInset, pexLayer;

        // 1. BORDES MÁS FINOS Y ELEGANTES (Gris oscuro, no negro puro)
        function getStyle(name) {
            let n = name ? name.toUpperCase().trim() : "";
            let anio = periodos[currentIndex];
            return {
                fillColor: elecciones[anio][n] || "#eeeeee",
                weight: 0.8, // Grosor reducido
                opacity: 1, 
                color: "#444", // Gris oscuro profesional
                fillOpacity: 1
            };
        }

        // 3. RESTAURACIÓN DE INTERACTIVIDAD (Popups)
        function onEachFeature(feature, layer) {
            let nombre = feature.properties.NOMBDEP || "Región";
            layer.bindPopup("<b>" + nombre + "</b>", { closeButton: false });
            
            // Efecto visual al pasar el mouse (opcional)
            layer.on('mouseover', function() { this.setStyle({ weight: 2, color: '#000' }); });
            layer.on('mouseout', function() { this.setStyle({ weight: 0.8, color: '#444' }); });
        }

        fetch("mapa.geojson")
            .then(res => res.json())
            .then(data => {
                geoJsonLayer = L.geoJSON(data, {
                    style: function(f) { return getStyle(f.properties.NOMBDEP); },
                    onEachFeature: onEachFeature // Activamos los clics/popups
                }).addTo(map);

                // --- ZOOM CALLAO ---
                let callaoF = data.features.find(f => f.properties.NOMBDEP === "CALLAO");
                if (callaoF) {
                    let callaoGeom = JSON.parse(JSON.stringify(callaoF.geometry));
                    const shift = [-82, -10], scale = 7, center = [-77.12, -12.05];

                    function transform(coords) {
                        if (Array.isArray(coords[0])) return coords.map(transform);
                        return [shift[0] + (coords[0] - center[0]) * scale, shift[1] + (coords[1] - center[1]) * scale];
                    }
                    callaoGeom.coordinates = transform(callaoGeom.coordinates);

                    callaoInset = L.geoJSON(callaoGeom, { 
                        style: getStyle("CALLAO"),
                        onEachFeature: function(f, l) { l.bindPopup("<b>CALLAO (Zoom)</b>"); }
                    }).addTo(map);
                    
                    // Línea punteada sutil
                    L.polyline([[-11.2, -80.2], [-11.9, -77.2]], {
                        color: "#999", weight: 1, dashArray: "4, 4"
                    }).addTo(map);
                }

                // --- PEX (MÁS CERCA Y REDONDEADO) ---
                pexLayer = L.rectangle([[-15.5, -81], [-13.5, -79.5]], getStyle("EXTRANJERO")).addTo(map);
                pexLayer.bindPopup("<b>PERUANOS EN EL EXTERIOR</b>");
                pexLayer.getElement().classList.add('pex-rounded');

                // ANIMACIÓN
                setInterval(() => {
                    currentIndex = (currentIndex + 1) % periodos.length;
                    geoJsonLayer.setStyle(f => getStyle(f.properties.NOMBDEP));
                    if (callaoInset) callaoInset.setStyle(getStyle("CALLAO"));
                    if (pexLayer) pexLayer.setStyle(getStyle("EXTRANJERO"));
                    document.getElementById("year-display").innerText = "1ra Vuelta " + periodos[currentIndex];
                }, 2000);
            });
    </script>
</body>
</html>
