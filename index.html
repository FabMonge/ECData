<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ECData - Mapa Electoral Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: white; }
        #map { width: 100%; height: 100vh; }
        .year-label {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 10px; border: 2px solid black;
            font-family: Arial; font-weight: bold; font-size: 22px;
        }
        /* Estilo para redondear el cuadro del PEX vía SVG */
        .pex-rounded { rx: 10; ry: 10; }
    </style>
</head>
<body>
    <div id="year-display" class="year-label">1ra Vuelta 2011</div>
    <div id="map"></div>

    <script>
        var map = L.map('map', {
            zoomControl: false, dragging: false, scrollWheelZoom: false,
            doubleClickZoom: false, touchZoom: false, attributionControl: false
        }).setView([-9.5, -77.5], 5.2);

        const elecciones = {
            "2011": { "LIMA": "#ff8c00", "CALLAO": "#ce1126", "EXTRANJERO": "#ff8c00" },
            "2016": { "LIMA": "#ff8c00", "CALLAO": "#ffcc00", "EXTRANJERO": "#ffcc00" },
            "2021": { "LIMA": "#0047ab", "CALLAO": "#0047ab", "EXTRANJERO": "#0047ab" }
        };

        const periodos = ["2011", "2016", "2021"];
        let currentIndex = 0;
        let geoJsonLayer, callaoInset, pexLayer;

        function getStyle(name) {
            let n = name ? name.toUpperCase().trim() : "";
            let anio = periodos[currentIndex];
            return {
                fillColor: elecciones[anio][n] || "#eeeeee",
                weight: 1.5, 
                opacity: 1, 
                color: "black", // 1. BORDES NEGROS
                fillOpacity: 1
            };
        }

        fetch("mapa.geojson")
            .then(res => res.json())
            .then(data => {
                geoJsonLayer = L.geoJSON(data, {
                    style: function(f) { return getStyle(f.properties.NOMBDEP); }
                }).addTo(map);

                // --- 2. CONFIGURACIÓN CALLAO (AGRANDADO) ---
                let callaoF = data.features.find(f => f.properties.NOMBDEP === "CALLAO");
                if (callaoF) {
                    let callaoGeom = JSON.parse(JSON.stringify(callaoF.geometry));
                    
                    // MANIOBRAR AQUÍ: shift [X, Y], scale (tamaño)
                    const shift = [-82.5, -9.5]; 
                    const scale = 8; // Más grande que antes
                    const center = [-77.12, -12.05];

                    function transform(coords) {
                        if (Array.isArray(coords[0])) return coords.map(transform);
                        return [shift[0] + (coords[0] - center[0]) * scale, shift[1] + (coords[1] - center[1]) * scale];
                    }
                    callaoGeom.coordinates = transform(callaoGeom.coordinates);

                    callaoInset = L.geoJSON(callaoGeom, { style: getStyle("CALLAO") }).addTo(map);
                    
                    // PROPIEDADES DE LA LÍNEA PUNTEADA
                    L.polyline([[-10.8, -80.5], [-11.8, -77.2]], {
                        color: "black", 
                        weight: 1, 
                        dashArray: "3, 5", // 3px línea, 5px espacio
                        opacity: 0.5
                    }).addTo(map);
                }

                // --- 4. PERUANOS EN EL EXTERIOR (MÁS CERCA Y REDONDEADO) ---
                // Coordenadas: [Superior Izq], [Inferior Der]. 
                // He movido el eje X de -83 a -81.5 para acercarlo al mapa.
                pexLayer = L.rectangle([[-15.5, -81.5], [-13.5, -79.5]], getStyle("EXTRANJERO")).addTo(map);
                
                // Aplicamos clase CSS para redondear
                pexLayer.getElement().classList.add('pex-rounded');

                setInterval(() => {
                    currentIndex = (currentIndex + 1) % periodos.length;
                    geoJsonLayer.setStyle(f => getStyle(f.properties.NOMBDEP));
                    if (callaoInset) callaoInset.setStyle(getStyle("CALLAO"));
                    if (pexLayer) pexLayer.setStyle(getStyle("EXTRANJERO"));
                    document.getElementById("year-display").innerText = "1ra Vuelta " + periodos[currentIndex];
                }, 2000);
            });
    </script>
</body>
</html>
