<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECData - Mapa Electoral Interactivo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* 1. RESET Y FONDO BLANCO */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        #map { width: 100%; height: 100vh; background-color: #ffffff !important; }
        
        /* 2. ETIQUETA DE AÑO (ESTILO EL COMERCIO) */
        .year-label {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 10px; border: 1px solid #444;
            font-family: Arial, sans-serif; font-weight: bold; font-size: 22px;
            color: #333; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* 3. BORDES REDONDOS PARA PEX */
        .pex-rounded { rx: 15; ry: 15; stroke-linejoin: round; }
        
        /* LIMPIEZA DE CONTENEDORES LEAFLET */
        .leaflet-container { background: #fff !important; }
    </style>
</head>
<body>

    <div id="year-display" class="year-label">1ra Vuelta 2011</div>
    <div id="map"></div>

    <script>
        // --- CONFIGURACIÓN DEL MAPA ---
        var map = L.map('map', {
            zoomControl: false, dragging: false, scrollWheelZoom: false,
            doubleClickZoom: false, touchZoom: false, attributionControl: false
        }).setView([-9.5, -78.5], 5.2);

        // --- DATOS DE LAS ELECCIONES (Placeholders) ---
        // Aquí puedes agregar todos los departamentos (AREQUIPA, PIURA, etc.)
        const elecciones = {
            "2011": { "LIMA": "#ff8c00", "CALLAO": "#ce1126", "EXTRANJERO": "#ff8c00", "CUSCO": "#ce1126" },
            "2016": { "LIMA": "#ff8c00", "CALLAO": "#ffcc00", "EXTRANJERO": "#ffcc00", "CUSCO": "#ffcc00" },
            "2021": { "LIMA": "#0047ab", "CALLAO": "#0047ab", "EXTRANJERO": "#0047ab", "CUSCO": "#ce1126" }
        };

        const periodos = ["2011", "2016", "2021"];
        let currentIndex = 0;
        let geoJsonLayer, callaoInset, pexLayer;

        // --- ESTILO DE LAS REGIONES ---
        function getStyle(name) {
            let n = name ? name.toUpperCase().trim() : "";
            let anio = periodos[currentIndex];
            return {
                fillColor: elecciones[anio][n] || "#eeeeee",
                weight: 0.8, // BORDES FINOS
                opacity: 1, 
                color: "#444444", // GRIS OSCURO PROFESIONAL
                fillOpacity: 1
            };
        }

        // --- INTERACTIVIDAD ---
        function onEachFeature(feature, layer) {
            let nombre = feature.properties.NOMBDEP || "Región";
            layer.bindPopup("<b>" + nombre + "</b>", { closeButton: false });
            layer.on('click', function() { this.openPopup(); });
        }

        // --- CARGA DE DATOS (CON CACHE BUSTER) ---
        fetch("mapa.geojson?nocache=" + Date.now())
            .then(res => res.json())
            .then(data => {
                // 1. MAPA BASE PERÚ
                geoJsonLayer = L.geoJSON(data, {
                    style: f => getStyle(f.properties.NOMBDEP),
                    onEachFeature: onEachFeature
                }).addTo(map);

                // 2. ZOOM CALLAO (ESCALA 12)
                let callaoF = data.features.find(f => f.properties.NOMBDEP === "CALLAO");
                if (callaoF) {
                    let callaoGeom = JSON.parse(JSON.stringify(callaoF.geometry));
                    const shift = [-83.5, -9.5], scale = 12, center = [-77.12, -12.05];

                    function transform(coords) {
                        if (Array.isArray(coords[0])) return coords.map(transform);
                        return [shift[0] + (coords[0] - center[0]) * scale, shift[1] + (coords[1] - center[1]) * scale];
                    }
                    callaoGeom.coordinates = transform(callaoGeom.coordinates);

                    callaoInset = L.geoJSON(callaoGeom, { 
                        style: getStyle("CALLAO"),
                        onEachFeature: (f, l) => { l.bindPopup("<b>CALLAO (Zoom)</b>"); }
                    }).addTo(map);
                    
                    // --- LÍNEA DE CONEXIÓN SOLDADA ---
                    // Punto A (en el zoom): Entra un poco al área del zoom para asegurar unión
                    // Punto B (en el mapa real): Cae justo en el Callao base
                    L.polyline([[-10.4, -81.5], [-12.05, -77.12]], {
                        color: "#444", weight: 1.2, dashArray: "5, 5", opacity: 0.8
                    }).addTo(map).bringToFront();
                }

                // 3. RECUADRO PEX (REDONDEADO)
                pexLayer = L.rectangle([[-15.5, -81.5], [-13.5, -79.5]], getStyle("EXTRANJERO")).addTo(map);
                pexLayer.bindPopup("<b>PERUANOS EN EL EXTERIOR</b>");
                let pexEl = pexLayer.getElement();
                if(pexEl) pexEl.classList.add('pex-rounded');

                // --- CICLO DE ANIMACIÓN ---
                setInterval(() => {
                    currentIndex = (currentIndex + 1) % periodos.length;
                    geoJsonLayer.setStyle(f => getStyle(f.properties.NOMBDEP));
                    if (callaoInset) callaoInset.setStyle(getStyle("CALLAO"));
                    if (pexLayer) pexLayer.setStyle(getStyle("EXTRANJERO"));
                    document.getElementById("year-display").innerText = "1ra Vuelta " + periodos[currentIndex];
                }, 2000);
            })
            .catch(err => console.error("Error al cargar el mapa:", err));
    </script>
</body>
</html>
